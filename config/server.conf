# nVPN Server Configuration
# ==============================

# Network settings
bind_address = 0.0.0.0
port = 8443
udp_port = 8444

# VPN network configuration
vpn_network = 10.8.0.0
vpn_netmask = 255.255.255.0
vpn_gateway = 10.8.0.1

# Security settings
cert_path = /etc/nvpn/server.crt
key_path = /etc/nvpn/server.key

# Connection settings
max_clients = 100
keepalive_interval = 30
handshake_timeout = 60

# Obfuscation settings
# Options: none, tls, http2, websocket
obfuscation_mode = tls
sni_hostname = www.cloudflare.com

# Logging
log_level = info
log_file = /var/log/nvpn/server.log
